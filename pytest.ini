[pytest]
# pytest配置文件

# 测试发现
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试标记
markers =
    slow: 标记为慢速测试
    integration: 集成测试
    unit: 单元测试
    api: API接口测试
    retrieval: 检索测试
    error_handling: 错误处理测试
    ai_quality: AI质量测试

# 测试输出
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# 测试超时
timeout = 300

# 测试覆盖率
cov = .
cov-report = html term-missing
cov-config = .coveragerc

# 测试报告
html = report.html
self-contained-html = true

# 并行测试
numprocesses = auto

# 测试顺序
ordering = ordered

# 测试重试
reruns = 2
reruns-delay = 1